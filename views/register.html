<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Campus Event Planner</title>

    <link rel="stylesheet" href="../public/css/style.css">
    <script src="../public/js/main.js"></script>
</head>
<body class="log-in-page">

    <!--Navbar-->

    <nav class="navbar">
        <div class="navbar-logo"><a id="CEPID" href="index.html">Campus Event Planner</a></div>

        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>

        <div class="navbar-actions">
            <a href="login.html" class="btn">Login</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <p class="auth-subtext">Sign up to discover and register for campus events.</p>

            <form action="#" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first-name" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last-name" placeholder="Last name" required>
                    </div>
                </div>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@concordia.ca" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>

                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required>

                <label for="role">I am registering as</label>
                <select id="role" name="role" required>
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="admin">Organizer / Admin</option>
                </select>

                <button type="submit" class="auth-submit">Sign Up</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

</body>
</html>
