<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Event Planner</title>

    <!-- Adjusted path for Live Server -->
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body class="log-in-page">

    <!--Navbar-->
    <nav class="navbar">
        <div class="navbar-logo"><a id="CEPID" href="index.html">Campus Event Planner</a></div>

        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>

        <div class="navbar-actions">
            <a href="register.html" class="btn">Sign Up</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtext">Log in to browse and register for campus events.</p>

            <!-- Modified action to route to your admin dashboard for demo purposes -->
            <form action="admin-dashboard.html" method="GET">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@concordia.ca" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>

                <button type="submit" class="auth-submit btn">Log In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
    </div>

    <!-- Ensure your JavaScript is linked at the bottom -->
    <script src="/public/js/main.js"></script>
</body>
</html>
